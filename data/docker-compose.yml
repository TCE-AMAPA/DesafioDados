version: '3.8'

services:
  db_local:
    image: postgres:17-alpine
    container_name: DB-postgreSql
    environment:
      POSTGRES_USER: usuario_teste
      POSTGRES_PASSWORD: senha_forte
      POSTGRES_DB: rgf_dados
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: